<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screen Time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --ink:#1b1d22; --paper:#f6f4ef; --line:#d9d4c7;
  --accent:#3f6b52; --warn:#a9462f;
  --muted:#7a766c; --card:#ffffff;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--paper); color:var(--ink); font-family:'Georgia',serif;}

/* LAYOUT */
.shell{
  height:100vh;
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  grid-template-columns:1fr 1fr;
  grid-template-areas:
    "header header"
    "stats  stats"
    "chart  table"
    "footer footer";
  gap:0;
}

/* HEADER */
header{
  grid-area:header;
  padding:14px 28px 12px;
  border-bottom:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
}
header h1{font-size:20px; font-weight:400; letter-spacing:-0.01em;}
header p{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em;}
.hdr-right{display:flex; gap:10px; align-items:center;}
.btn-sm{
  font-family:inherit; font-size:12px; padding:6px 12px; cursor:pointer;
  border:1px solid var(--line); background:var(--card); color:var(--ink);
}
.btn-sm.primary{background:var(--ink); color:var(--paper); border-color:var(--ink);}
.btn-sm:hover{opacity:0.8;}
.storage-dot{font-size:11px; color:var(--muted); font-family:monospace;}
.storage-dot.ok{color:var(--accent);}

/* STATS */
.stats{
  grid-area:stats;
  display:grid; grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--line);
}
.stat{
  padding:12px 20px;
  border-right:1px solid var(--line);
}
.stat:last-child{border-right:none;}
.stat .lbl{font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted);}
.stat .val{font-size:22px; margin-top:3px;}
.stat .sub{font-size:11px; color:var(--muted); margin-top:2px;}
.delta-down{color:var(--accent);}
.delta-up{color:var(--warn);}

/* CHART PANEL */
.chart-panel{
  grid-area:chart;
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.tabs{
  display:flex; border-bottom:1px solid var(--line);
}
.tab{
  flex:1; padding:9px 0; text-align:center; font-size:12px;
  text-transform:uppercase; letter-spacing:0.07em; cursor:pointer;
  background:none; border:none; border-right:1px solid var(--line);
  color:var(--muted); font-family:inherit;
}
.tab:last-child{border-right:none;}
.tab.active{background:var(--card); color:var(--ink); font-weight:bold;}
.chart-wrap{flex:1; padding:16px; position:relative; min-height:0;}
.chart-wrap canvas{width:100%!important; height:100%!important;}
.empty-chart{
  position:absolute; inset:0; display:flex; align-items:center;
  justify-content:center; color:var(--muted); font-style:italic; font-size:14px;
}

/* TABLE PANEL */
.table-panel{
  grid-area:table;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.panel-label{
  padding:9px 18px; font-size:10px; text-transform:uppercase;
  letter-spacing:0.09em; color:var(--muted); border-bottom:1px solid var(--line);
  background:#faf9f5;
}
.table-scroll{flex:1; overflow-y:auto;}
table{width:100%; border-collapse:collapse; font-size:12px;}
th{
  position:sticky; top:0; background:#faf9f5;
  padding:7px 12px; text-align:left; font-size:10px;
  text-transform:uppercase; letter-spacing:0.06em; color:var(--muted);
  border-bottom:1px solid var(--line);
}
td{padding:7px 12px; border-bottom:1px solid var(--line); vertical-align:top;}
tr:last-child td{border-bottom:none;}
.app-chip{
  display:inline-block; background:var(--paper); border:1px solid var(--line);
  border-radius:2px; padding:1px 5px; margin:1px 2px 1px 0; font-size:10px;
}
.note-cell{color:var(--warn); font-size:11px; font-style:italic;}

/* FOOTER */
footer{
  grid-area:footer;
  padding:7px 28px;
  border-top:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
}
footer span{font-size:11px; color:var(--muted);}

/* MODAL */
.modal-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.35); z-index:100;
  align-items:center; justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--card); border:1px solid var(--line);
  width:520px; max-width:95vw; max-height:90vh;
  display:flex; flex-direction:column;
}
.modal-head{
  padding:16px 20px; border-bottom:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
}
.modal-head h2{font-size:16px; font-weight:400;}
.modal-close{
  background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted);
}
.modal-body{padding:20px; overflow-y:auto; flex:1;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
label{display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:4px;}
input[type=text],input[type=date],input[type=number]{
  width:100%; padding:8px 10px; border:1px solid var(--line);
  background:var(--paper); font-family:inherit; font-size:13px; color:var(--ink);
}
input:focus{outline:2px solid var(--accent); outline-offset:1px;}
.app-row{display:grid; grid-template-columns:1fr 1fr auto; gap:8px; margin-bottom:6px; align-items:center;}
.app-row button{
  background:none; border:1px solid var(--line); color:var(--warn);
  width:30px; height:34px; cursor:pointer; font-size:16px; line-height:1;
}
.btn-add-app{
  width:100%; padding:7px; background:none; border:1px dashed var(--line);
  color:var(--muted); font-size:12px; cursor:pointer; margin:6px 0 14px; font-family:inherit;
}
.modal-foot{
  padding:14px 20px; border-top:1px solid var(--line);
  display:flex; gap:10px; justify-content:flex-end;
}
.btn-full{
  font-family:inherit; font-size:13px; padding:9px 18px; cursor:pointer;
  border:1px solid var(--ink); background:var(--ink); color:var(--paper);
}
.btn-cancel{background:var(--card); color:var(--ink);}
input[type=file]{display:none;}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header>
    <div>
      <h1>Screen Time</h1>
      <p>your weekly record</p>
    </div>
    <div class="hdr-right">
      <span class="storage-dot" id="storageDot">● browser storage</span>
      <button class="btn-sm" id="loadBtn">Load data.json</button>
      <button class="btn-sm" id="downloadBtn">Download data.json</button>
      <button class="btn-sm primary" id="openModalBtn">+ Add Week</button>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats" id="statsBar">
    <div class="stat"><div class="lbl">Weeks logged</div><div class="val" id="s-weeks">—</div><div class="sub" id="s-range">no data yet</div></div>
    <div class="stat"><div class="lbl">Latest daily avg</div><div class="val" id="s-avg">—</div><div class="sub" id="s-avg-delta"></div></div>
    <div class="stat"><div class="lbl">Latest Instagram</div><div class="val" id="s-ig">—</div><div class="sub" id="s-ig-delta"></div></div>
    <div class="stat"><div class="lbl">Latest Forest</div><div class="val" id="s-forest">—</div><div class="sub" id="s-forest-delta"></div></div>
  </div>

  <!-- CHART -->
  <div class="chart-panel">
    <div class="tabs">
      <button class="tab active" data-tab="avg">Daily Average</button>
      <button class="tab" data-tab="ig">Instagram</button>
      <button class="tab" data-tab="forest">Forest</button>
    </div>
    <div class="chart-wrap">
      <div class="empty-chart" id="emptyChart">No data yet — add your first week</div>
      <canvas id="mainChart" style="display:none;"></canvas>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-panel">
    <div class="panel-label">All weeks</div>
    <div class="table-scroll">
      <table id="weekTable">
        <thead><tr><th>Week</th><th>Avg</th><th>Total</th><th>Apps</th><th>Note</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="5" style="color:var(--muted);font-style:italic;padding:20px 12px;">No weeks logged yet.</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>kept locally · no cloud</span>
    <span id="lastSaved"></span>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Add week</h2>
      <button class="modal-close" id="closeModal">×</button>
    </div>
    <div class="modal-body">
      <form id="weekForm">
        <div class="form-row">
          <div><label>Week start</label><input type="date" id="weekStart" required></div>
          <div><label>Week end</label><input type="date" id="weekEnd" required></div>
        </div>
        <div class="form-row">
          <div><label>Daily avg (e.g. 5h 46m)</label><input type="text" id="dailyAvg" placeholder="5h 46m" required></div>
          <div><label>Total screen time</label><input type="text" id="totalTime" placeholder="40h 26m" required></div>
        </div>
        <div class="form-row full">
          <div><label>Note (optional)</label><input type="text" id="weekNote" placeholder='e.g. "Eid week" or "deleted Instagram"'></div>
        </div>
        <label style="margin-top:4px;">App breakdown</label>
        <div id="appRows" style="margin-top:8px;"></div>
        <button type="button" class="btn-add-app" id="addAppBtn">+ add app</button>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn-full btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-full" id="saveWeekBtn">Save week</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json">

<script>
let weeks = [];
let activeTab = 'avg';
let chartInst = null;

/* ── STORAGE ── */
function saveLocal(){ localStorage.setItem('st_weeks', JSON.stringify(weeks)); }
function loadLocal(){
  const s = localStorage.getItem('st_weeks');
  if(s){ try{ weeks = JSON.parse(s); }catch(e){ weeks=[]; } }
  else{ weeks=[]; }
}

/* ── TIME HELPERS ── */
function parseHM(str){
  if(!str) return null;
  const h=/(\d+)\s*h/i.exec(str), m=/(\d+)\s*m/i.exec(str);
  if(!h && !m) return null;
  return (h?parseInt(h[1]):0)*60+(m?parseInt(m[1]):0);
}
function fmtMin(min){
  if(min===null||min===undefined) return '—';
  const h=Math.floor(min/60), m=Math.round(min%60);
  return `${h}h ${m}m`;
}
function findApp(week, key){
  const a = week.apps.find(x=>x.name.toLowerCase().includes(key));
  return a ? parseHM(a.time) : null;
}
function weekLabel(w){
  const fmt = d => new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(w.start)} – ${fmt(w.end)}`;
}

/* ── RENDER ── */
function renderAll(){
  weeks.sort((a,b)=>new Date(a.start)-new Date(b.start));
  renderStats();
  renderChart();
  renderTable();
}

function renderStats(){
  const n = weeks.length;
  document.getElementById('s-weeks').textContent = n || '—';
  if(n===0){
    document.getElementById('s-range').textContent = 'no data yet';
    ['s-avg','s-ig','s-forest'].forEach(id=>{ document.getElementById(id).textContent='—'; });
    ['s-avg-delta','s-ig-delta','s-forest-delta'].forEach(id=>{ document.getElementById(id).textContent=''; });
    return;
  }
  document.getElementById('s-range').textContent = `${weekLabel(weeks[0])} → ${weekLabel(weeks[n-1])}`;

  const last = weeks[n-1];
  const first = weeks[0];

  // avg
  const lastAvg = parseHM(last.dailyAvg);
  const firstAvg = parseHM(first.dailyAvg);
  document.getElementById('s-avg').textContent = last.dailyAvg || '—';
  if(lastAvg!==null && firstAvg!==null && n>1){
    const d = lastAvg - firstAvg;
    const el = document.getElementById('s-avg-delta');
    el.textContent = `${d<=0?'↓':'↑'} ${fmtMin(Math.abs(d))} vs wk 1`;
    el.className = 'sub ' + (d<=0?'delta-down':'delta-up');
  }

  // ig
  const lastIG = findApp(last,'instagram');
  const firstIG = findApp(first,'instagram');
  document.getElementById('s-ig').textContent = lastIG!==null ? fmtMin(lastIG) : '—';
  if(lastIG!==null && firstIG!==null && n>1){
    const d = lastIG - firstIG;
    const el = document.getElementById('s-ig-delta');
    el.textContent = `${d<=0?'↓':'↑'} ${fmtMin(Math.abs(d))} vs wk 1`;
    el.className = 'sub ' + (d<=0?'delta-down':'delta-up');
  }

  // forest
  const lastF = findApp(last,'forest');
  const firstF = findApp(first,'forest');
  document.getElementById('s-forest').textContent = lastF!==null ? fmtMin(lastF) : '—';
  if(lastF!==null && firstF!==null && n>1){
    const d = lastF - firstF;
    const el = document.getElementById('s-forest-delta');
    el.textContent = `${d<=0?'↓':'↑'} ${fmtMin(Math.abs(d))} vs wk 1`;
    el.className = 'sub ' + (d<=0?'delta-down':'delta-up');
  }
}

function getChartData(){
  const labels = weeks.map(weekLabel);
  if(activeTab==='avg'){
    return {
      labels,
      data: weeks.map(w=>{ const v=parseHM(w.dailyAvg); return v!==null?+(v/60).toFixed(2):null; }),
      color:'#a9462f', label:'Daily avg (hrs)'
    };
  }
  if(activeTab==='ig'){
    return {
      labels,
      data: weeks.map(w=>{ const v=findApp(w,'instagram'); return v!==null?+(v/60).toFixed(2):null; }),
      color:'#a9462f', label:'Instagram (hrs)'
    };
  }
  return {
    labels,
    data: weeks.map(w=>{ const v=findApp(w,'forest'); return v!==null?+(v/60).toFixed(2):null; }),
    color:'#3f6b52', label:'Forest focus (hrs)'
  };
}

function renderChart(){
  const empty = document.getElementById('emptyChart');
  const canvas = document.getElementById('mainChart');
  if(weeks.length===0){
    empty.style.display='flex'; canvas.style.display='none';
    if(chartInst){ chartInst.destroy(); chartInst=null; }
    return;
  }
  empty.style.display='none'; canvas.style.display='block';
  const {labels,data,color,label} = getChartData();
  if(chartInst) chartInst.destroy();
  chartInst = new Chart(canvas, {
    type:'line',
    data:{ labels, datasets:[{
      label, data,
      borderColor:color, backgroundColor:color+'22',
      borderWidth:2, fill:true, tension:0.3,
      pointRadius:4, pointBackgroundColor:color, spanGaps:true
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{ beginAtZero:true, title:{display:true,text:'hours'}, grid:{color:'#eee'} },
        x:{ grid:{display:false}, ticks:{font:{size:10}} }
      }
    }
  });
}

function renderTable(){
  const tbody = document.getElementById('tableBody');
  if(weeks.length===0){
    tbody.innerHTML='<tr><td colspan="5" style="color:var(--muted);font-style:italic;padding:20px 12px;">No weeks logged yet.</td></tr>';
    return;
  }
  tbody.innerHTML = weeks.slice().reverse().map(w=>{
    const chips = w.apps.map(a=>`<span class="app-chip">${a.name} ${a.time}</span>`).join('');
    return `<tr>
      <td style="white-space:nowrap;">${weekLabel(w)}</td>
      <td style="white-space:nowrap;">${w.dailyAvg}</td>
      <td style="white-space:nowrap;">${w.total}</td>
      <td>${chips}</td>
      <td class="note-cell">${w.note||''}</td>
    </tr>`;
  }).join('');
}

/* ── TABS ── */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderChart();
  });
});

/* ── MODAL ── */
function openModal(){
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('appRows').innerHTML='';
  addAppRow(); addAppRow(); addAppRow();
  document.getElementById('weekForm').reset();
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('openModalBtn').addEventListener('click', openModal);
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelModal').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

function addAppRow(name='',time=''){
  const container = document.getElementById('appRows');
  const row = document.createElement('div');
  row.className='app-row';
  row.innerHTML=`
    <input type="text" placeholder="App name" class="appName" value="${name}">
    <input type="text" placeholder="e.g. 9h 22m" class="appTime" value="${time}">
    <button type="button" class="rmApp">×</button>`;
  row.querySelector('.rmApp').addEventListener('click',()=>row.remove());
  container.appendChild(row);
}
document.getElementById('addAppBtn').addEventListener('click',()=>addAppRow());

document.getElementById('saveWeekBtn').addEventListener('click',()=>{
  const start = document.getElementById('weekStart').value;
  const end = document.getElementById('weekEnd').value;
  const dailyAvg = document.getElementById('dailyAvg').value.trim();
  const total = document.getElementById('totalTime').value.trim();
  const note = document.getElementById('weekNote').value.trim();
  if(!start||!end||!dailyAvg||!total){ alert('Please fill week dates, daily avg, and total.'); return; }
  const apps = [...document.querySelectorAll('.app-row')].map(r=>({
    name:r.querySelector('.appName').value.trim(),
    time:r.querySelector('.appTime').value.trim()
  })).filter(a=>a.name&&a.time);
  weeks.push({start,end,dailyAvg,total,apps,note});
  saveLocal();
  document.getElementById('lastSaved').textContent = 'saved ' + new Date().toLocaleTimeString();
  closeModal();
  renderAll();
});

/* ── DATA FILE LOAD/DOWNLOAD ── */
document.getElementById('loadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', async e=>{
  const file = e.target.files[0]; if(!file) return;
  const text = await file.text();
  try{
    const parsed = JSON.parse(text);
    weeks = parsed.weeks || [];
    saveLocal();
    renderAll();
    document.getElementById('storageDot').textContent = '● data.json loaded';
    document.getElementById('storageDot').className = 'storage-dot ok';
  }catch(err){ alert("Couldn't read that file — make sure it's a valid data.json from this dashboard."); }
  e.target.value='';
});
document.getElementById('downloadBtn').addEventListener('click',()=>{
  const blob = new Blob([JSON.stringify({weeks},null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='data.json'; a.click();
  URL.revokeObjectURL(url);
});

/* ── INIT ── */
loadLocal();
renderAll();
</script>
</body>
</html>
